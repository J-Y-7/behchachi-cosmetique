<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behchachi Cosmetique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* أحمر نيون متوازن وواضح */
            --neon-red: #ff3333; 
            --main-bg: #000000;
        }

        body {
            background-color: var(--main-bg);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة الترحيب */
        .intro-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutOverlay 0.8s forwards 5s;
        }

        .intro-text {
            position: absolute;
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff; /* جعلنا النص أبيض ليكون واضحاً جداً */
            /* توهج أحمر خفيف حول النص الأبيض ليعطي تأثير النيون دون تشويش */
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red);
            opacity: 0;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .msg-1 { animation: dustEffect 2.5s forwards; }
        .msg-2 { animation: dustEffect 2.5s forwards 2.5s; }

        @keyframes dustEffect {
            0% { opacity: 0; transform: scale(0.9); filter: blur(8px); }
            30% { opacity: 1; filter: blur(0); transform: scale(1); }
            70% { opacity: 1; filter: blur(0); transform: scale(1); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(15px); }
        }

        @keyframes fadeOutOverlay {
            to { visibility: hidden; opacity: 0; }
        }

        /* محتوى الموقع */
        .main-content {
            opacity: 0;
            animation: fadeInSite 1.2s forwards 5.5s;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        @keyframes fadeInSite {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: #080808; 
            padding: 40px 20px;
            border: 1px solid #222; /* حدود رمادية هادئة وواضحة */
            border-radius: 5px;
        }

        .logo-img {
            width: 105px;
            height: 105px;
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 1.3rem; 
            color: #ffffff; 
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .tagline { 
            color: var(--neon-red); 
            font-size: 0.8rem; 
            font-weight: 600; 
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: #000;
            border: 1px solid #333;
            padding: 16px;
            color: #ffffff; /* نص أبيض صريح للوضوح */
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: 0.3s ease;
            font-size: 0.95rem;
        }

        .btn i {
            color: var(--neon-red); /* الأيقونات هي التي تنبض بالأحمر */
            animation: subtlePulse 2s infinite ease-in-out;
        }

        .btn:hover { 
            border-color: var(--neon-red); 
            color: var(--neon-red);
            background: rgba(255, 51, 51, 0.05);
        }

        @keyframes subtlePulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        .map-btn {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--neon-red);
            padding: 15px;
            color: #ffffff;
            text-decoration: none;
            display: block;
            font-weight: bold;
            transition: 0.3s;
        }

        .map-btn:hover {
            background: var(--neon-red);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="intro-overlay">
        <div class="intro-text msg-1">WELCOME TO</div>
        <div class="intro-text msg-2">BEHCHACHI COSMETIQUE</div>
    </div>

    <div class="main-content">
        <div class="main-card">
            <header>
                <img src="logo.png" alt="Logo" class="logo-img">
                <h1>BEHCHACHI COSMETIQUE</h1>
                <p class="tagline">LUXURY EXPERIENCE</p>
            </header>

            <div class="links">
                <a href="https://wa.me/213777060507" class="btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
                <a href="https://www.facebook.com/cosmitique.behchachi" class="btn" target="_blank">
                    <i class="fab fa-facebook-f"></i> FACEBOOK
                </a>
                <a href="https://www.instagram.com/rafikrafik3503" class="btn" target="_blank">
                    <i class="fab fa-instagram"></i> INSTAGRAM
                </a>
                <a href="https://www.tiktok.com/@cosmetique.behchachi" class="btn" target="_blank">
                    <i class="fab fa-tiktok"></i> TIKTOK
                </a>
            </div>

            <a href="https://maps.google.com/?q=Mila" class="map-btn" target="_blank">
                <i class="fas fa-location-arrow"></i> FIND US IN MILA
            </a>
        </div>
    </div>

    <script>
        setTimeout(() => { document.body.style.overflow = "auto"; }, 6000);
    </script>
</body>
</html>
