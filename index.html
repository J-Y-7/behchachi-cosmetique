<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Behchachi Cosmetique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- شاشة الترحيب السينمائية --- */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: slideUp 0.8s cubic-bezier(0.9, 0, 0.1, 1) forwards 6.5s;
        }

        .welcome-msg, .brand-name-intro {
            position: absolute;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            opacity: 0;
        }

        .welcome-msg {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            letter-spacing: 8px;
            color: #d4af37;
            animation: fadeInOutIntro 3s forwards;
        }

        .brand-name-intro {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 800;
            color: #fff;
            animation: fadeInOutIntro 3s forwards 3s;
        }

        @keyframes fadeInOutIntro {
            0% { opacity: 0; filter: blur(10px); transform: scale(0.9); }
            20% { opacity: 1; filter: blur(0); transform: scale(1); }
            80% { opacity: 1; filter: blur(0); transform: scale(1); }
            100% { opacity: 0; filter: blur(10px); transform: scale(1.05); }
        }

        @keyframes slideUp { to { transform: translateY(-110%); visibility: hidden; } }

        /* --- المحتوى الرئيسي --- */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
            opacity: 0;
            animation: fadeInContent 1s forwards 7s;
        }

        @keyframes fadeInContent { to { opacity: 1; } }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 35px; }

        /* --- الأزرار النابضة --- */
        .links-list { display: flex; flex-direction: column; gap: 20px; }

        .link-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            padding: 18px 25px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            opacity: 0;
            animation: fadeInUp 0.6s forwards, pulseGlow 2.5s infinite ease-in-out;
        }

        /* توقيت الظهور وألوان النبض لكل زر */
        .link-card:nth-child(1) { animation-delay: 7.2s; --glow: #25D366; }
        .link-card:nth-child(2) { animation-delay: 7.4s; --glow: #1877F2; }
        .link-card:nth-child(3) { animation-delay: 7.6s; --glow: #E4405F; }
        .link-card:nth-child(4) { animation-delay: 7.8s; --glow: #ff0050; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* تأثير النبض (Pulse) */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 15px var(--glow); border-color: var(--glow); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        }

        .link-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
        }

        .link-card i { font-size: 1.4rem; color: var(--glow); }
        .link-card span { font-weight: 600; font-size: 1rem; }

        .map-link {
            margin-top: 45px;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 1s forwards 8.2s;
        }
    </style>
</head>
<body>

    <div class="intro-overlay">
        <div class="welcome-msg">WELCOME TO</div>
        <div class="brand-name-intro">BEHCHACHI COSMETIQUE</div>
    </div>

    <div class="container">
        <img src="logo.png" alt="Logo" class="profile-img">
        <h1>BEHCHACHI COSMETIQUE</h1>
        
        <div class="links-list">
            <a href="https://wa.me/213777060507" class="link-card">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
                <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>
            <a href="https://www.facebook.com/cosmitique.behchachi" class="link-card">
                <i class="fab fa-facebook-f"></i>
                <span>فيسبوك</span>
                <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>
            <a href="https://www.instagram.com/rafikrafik3503" class="link-card">
                <i class="fab fa-instagram"></i>
                <span>إنستغرام</span>
                <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>
            <a href="https://www.tiktok.com/@cosmetique.behchachi" class="link-card">
                <i class="fab fa-tiktok"></i>
                <span>تيك توك</span>
                <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>
        </div>

        <a href="https://maps.google.com/?q=Mila,Algeria" class="map-link" target="_blank">
             MILA, ALGERIA <i class="fas fa-map-marker-alt"></i>
        </a>
    </div>

</body>
</html>
