<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behchachi Cosmetique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* أحمر نقي ومركز */
            --neon-red: #ff0000; 
            --main-bg: #000000;
        }

        body {
            background-color: var(--main-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة الترحيب السينمائية */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutOverlay 1s forwards 5s;
        }

        .intro-text {
            position: absolute;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--neon-red);
            /* توهج أحمر مضاعف لزيادة القوة */
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
            opacity: 0;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .msg-1 { animation: dustEffect 2.5s forwards; }
        .msg-2 { animation: dustEffect 2.5s forwards 2.5s; }

        @keyframes dustEffect {
            0% { opacity: 0; transform: scale(0.8); filter: blur(12px); }
            20% { opacity: 1; filter: blur(0); transform: scale(1); }
            80% { opacity: 1; filter: blur(0); transform: scale(1); }
            100% { opacity: 0; transform: scale(1.2); filter: blur(20px); }
        }

        @keyframes fadeOutOverlay {
            to { visibility: hidden; opacity: 0; }
        }

        /* محتوى الموقع */
        .main-content {
            opacity: 0;
            animation: fadeInSite 1.5s forwards 5.5s;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        @keyframes fadeInSite {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: #050000; 
            padding: 40px 20px;
            border: 1px solid #330000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
        }

        .logo-img {
            width: 110px;
            height: 110px;
            border: 2px solid var(--neon-red);
            /* توهج الشعار أصبح أقوى */
            box-shadow: 0 0 10px var(--neon-red), 0 0 20px rgba(255, 0, 0, 0.5);
            object-fit: cover;
            margin-bottom: 25px;
        }

        h1 { font-size: 1.4rem; letter-spacing: 1px; color: #fff; text-shadow: 0 0 5px rgba(255, 0, 0, 0.5); }
        p.tagline { color: var(--neon-red); font-size: 0.85rem; letter-spacing: 2px; font-weight: bold; }

        .links { display: flex; flex-direction: column; gap: 14px; }

        .btn {
            background: #000;
            border: 1px solid #330000;
            padding: 16px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: 0.3s ease;
        }

        .btn i {
            font-size: 1.2rem;
            animation: pulseGlowRed 2s infinite ease-in-out;
        }

        .btn:hover { 
            border-color: var(--neon-red); 
            box-shadow: 0 0 20px var(--neon-red);
            color: var(--neon-red);
            background: rgba(255, 0, 0, 0.05);
        }

        @keyframes pulseGlowRed {
            0% { color: #fff; text-shadow: 0 0 5px var(--neon-red); }
            50% { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
            100% { color: #fff; text-shadow: 0 0 5px var(--neon-red); }
        }

        .map-btn {
            margin-top: 35px;
            border: 2px solid var(--neon-red);
            padding: 18px;
            color: white;
            text-decoration: none;
            display: block;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-red);
            transition: 0.3s;
        }

        .map-btn:hover {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 30px var(--neon-red);
        }
    </style>
</head>
<body>

    <div class="intro-overlay">
        <div class="intro-text msg-1">WELCOME TO</div>
        <div class="intro-text msg-2">BEHCHACHI COSMETIQUE</div>
    </div>

    <div class="main-content">
        <div class="main-card">
            <header>
                <img src="logo.png" alt="Logo" class="logo-img">
                <h1>BEHCHACHI COSMETIQUE</h1>
                <p class="tagline">LUXURY EXPERIENCE</p>
            </header>

            <div class="links">
                <a href="https://wa.me/213777060507" class="btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
                <a href="https://www.facebook.com/cosmitique.behchachi" class="btn" target="_blank">
                    <i class="fab fa-facebook-f"></i> FACEBOOK
                </a>
                <a href="https://www.instagram.com/rafikrafik3503" class="btn" target="_blank">
                    <i class="fab fa-instagram"></i> INSTAGRAM
                </a>
                <a href="https://www.tiktok.com/@cosmetique.behchachi" class="btn" target="_blank">
                    <i class="fab fa-tiktok"></i> TIKTOK
                </a>
            </div>

            <a href="https://maps.google.com/?q=Mila" class="map-btn" target="_blank">
                <i class="fas fa-location-arrow"></i> FIND US IN MILA
            </a>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.body.style.overflow = "auto";
        }, 6000);
    </script>

</body>
</html>
